<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELL PIZZA | Staff Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Bebas+Neue&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --red:#C80613; --bone:#E1D8B7; --black:#151515; --fh:'Bebas Neue',cursive; --fd:'Pirata One',cursive; --fb:'Roboto',sans-serif; }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
        body{background:var(--black);color:var(--bone);font-family:var(--fb);min-height:100vh;overflow-x:hidden;letter-spacing:.02em;}
        .texture{position:fixed;inset:0;background-image:url('https://www.transparenttextures.com/patterns/dark-leather.png');opacity:.1;pointer-events:none;z-index:0;}
        .wrap{max-width:1100px;margin:4rem auto;padding:3rem;background:rgba(20,20,20,.95);border:1px solid rgba(225,216,183,.1);border-radius:4px;position:relative;z-index:10;overflow:hidden;}
        .wrap::before{content:'';position:absolute;top:50%;left:50%;width:70%;height:50%;background:var(--red);filter:blur(120px);opacity:.09;transform:translate(-50%,-50%);pointer-events:none;}
        .wrap>*{position:relative;z-index:1;}
        .topbar{display:flex;align-items:center;justify-content:space-between;padding-bottom:2rem;margin-bottom:2.5rem;border-bottom:1px solid rgba(225,216,183,.1);}
        .topbar-brand{font-family:var(--fh);font-size:1.6rem;letter-spacing:.2em;}
        .topbar-brand span{color:var(--red);}
        .topbar-right{display:flex;gap:.8rem;align-items:center;}
        .topbar-link,.dev-btn{background:none;border:1px solid rgba(225,216,183,.15);color:var(--bone);padding:.5rem 1.2rem;font-family:var(--fh);font-size:.95rem;letter-spacing:.12em;cursor:pointer;text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:.5rem;}
        .dev-btn{background:rgba(225,216,183,.05);}
        .topbar-link:hover,.dev-btn:hover{border-color:var(--red);color:var(--red);}
        /* Dev panel */
        .dev-panel{display:none;background:rgba(225,216,183,.03);border:1px solid rgba(225,216,183,.1);padding:2rem;margin-bottom:2.5rem;}
        .dev-panel.open{display:block;}
        .dev-panel-title{font-family:var(--fh);font-size:1.4rem;letter-spacing:.1em;color:var(--red);margin-bottom:1.5rem;display:flex;align-items:center;gap:.6rem;}
        .dev-section{margin-bottom:2rem;padding-bottom:2rem;border-bottom:1px solid rgba(225,216,183,.06);}
        .dev-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
        .dev-section-title{font-size:.75rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase;opacity:.5;margin-bottom:1rem;}
        .slot-toggles{display:flex;gap:.8rem;flex-wrap:wrap;}
        .slot-toggle{display:flex;align-items:center;gap:.8rem;border:1px solid rgba(225,216,183,.12);padding:.8rem 1.2rem;cursor:pointer;transition:all .2s;user-select:none;}
        .slot-toggle.stopped{border-color:var(--red);background:rgba(200,6,19,.08);}
        .slot-toggle-time{font-family:var(--fd);font-size:1.4rem;}
        .slot-toggle-status{font-size:.65rem;font-weight:900;letter-spacing:.15em;text-transform:uppercase;opacity:.4;}
        .slot-toggle.stopped .slot-toggle-status{color:var(--red);opacity:1;}
        .toggle-switch{width:36px;height:20px;background:rgba(225,216,183,.1);border-radius:10px;position:relative;transition:background .2s;flex-shrink:0;}
        .toggle-switch::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:rgba(225,216,183,.4);top:3px;left:3px;transition:all .2s;}
        .slot-toggle.stopped .toggle-switch{background:var(--red);}
        .slot-toggle.stopped .toggle-switch::after{left:19px;background:#fff;}
        .block-dates,.dev-date-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1rem;}
        .block-date-btn{padding:1rem;background:transparent;border:1px solid rgba(225,216,183,.12);color:var(--bone);cursor:pointer;text-align:center;transition:all .2s;}
        .block-date-btn .bd-day{display:block;font-family:var(--fh);font-size:1.6rem;line-height:1;}
        .block-date-btn .bd-month{display:block;font-size:.65rem;font-weight:700;letter-spacing:.1em;opacity:.5;margin-top:.2rem;}
        .block-date-btn.active-dev{border-color:var(--bone);}
        .block-date-btn.blocked{background:rgba(200,6,19,.12);border-color:var(--red);}
        .block-date-btn.blocked .bd-day{color:var(--red);}
        .block-label{font-size:.75rem;opacity:.5;font-style:italic;}
        /* Home */
        .home-heading{margin-bottom:2.5rem;}
        .home-heading h1{font-family:var(--fh);font-size:3.5rem;letter-spacing:.08em;line-height:1;}
        .home-heading p{font-size:.8rem;font-weight:900;letter-spacing:.3em;text-transform:uppercase;color:var(--red);margin-top:.5rem;}
        .tuesday-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem;}
        .tuesday-card{border:1px solid rgba(225,216,183,.12);background:rgba(225,216,183,.02);padding:2rem;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
        .tuesday-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);transform:scaleY(0);transform-origin:bottom;transition:transform .25s;}
        .tuesday-card:hover{border-color:rgba(225,216,183,.25);background:rgba(225,216,183,.045);box-shadow:0 0 30px rgba(200,6,19,.1);}
        .tuesday-card:hover::after{transform:scaleY(1);}
        .tuesday-card.is-blocked{border-color:rgba(200,6,19,.25);background:rgba(200,6,19,.04);}
        .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.8rem;}
        .card-date{display:flex;align-items:baseline;gap:.7rem;}
        .card-day-num{font-family:var(--fh);font-size:4.5rem;line-height:1;}
        .card-date-detail{display:flex;flex-direction:column;}
        .card-month{font-family:var(--fh);font-size:1.5rem;letter-spacing:.08em;opacity:.55;line-height:1.1;}
        .card-year{font-size:.65rem;font-weight:700;letter-spacing:.18em;opacity:.25;}
        .card-arrow{color:var(--red);opacity:0;transition:opacity .2s,transform .2s;margin-top:.3rem;}
        .tuesday-card:hover .card-arrow{opacity:1;transform:translateX(4px);}
        .card-divider{height:1px;background:rgba(225,216,183,.08);margin-bottom:1.5rem;}
        .card-bottom{display:flex;align-items:flex-end;justify-content:space-between;}
        .card-total{display:flex;align-items:baseline;gap:.4rem;}
        .card-total-num{font-family:var(--fh);font-size:3rem;line-height:1;color:var(--red);}
        .card-total-label{font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.35;}
        .card-slots-mini{display:flex;flex-direction:column;gap:.3rem;align-items:flex-end;}
        .mini-slot{font-size:.72rem;font-weight:700;letter-spacing:.05em;opacity:.28;display:flex;align-items:center;gap:.5rem;}
        .mini-slot.active{opacity:.8;}
        .mini-slot.stopped{opacity:.8;color:#ff8c00;}
        .mini-dot{width:5px;height:5px;border-radius:50%;background:var(--red);opacity:.4;}
        .mini-slot.active .mini-dot{opacity:1;}
        .mini-slot.stopped .mini-dot{background:#ff8c00;opacity:1;}
        .card-loading-text{font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;opacity:.3;}
        .badge{font-size:.6rem;font-weight:900;letter-spacing:.15em;text-transform:uppercase;padding:.25rem .6rem;border-radius:2px;}
        .badge-blocked{background:rgba(200,6,19,.15);color:var(--red);border:1px solid rgba(200,6,19,.3);}
        .badge-stopped{background:rgba(255,140,0,.15);color:#ff8c00;border:1px solid rgba(255,140,0,.3);}
        /* Session view */
        #sessionView{display:none;}
        .session-back{display:flex;align-items:center;gap:.5rem;background:none;border:none;color:var(--bone);font-family:var(--fh);font-size:.9rem;letter-spacing:.15em;cursor:pointer;opacity:.4;transition:opacity .2s;padding:0;margin-bottom:1.5rem;}
        .session-back:hover{opacity:1;}
        .session-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem;padding-bottom:2rem;border-bottom:1px solid rgba(225,216,183,.08);}
        .session-title h2{font-family:var(--fh);font-size:3.5rem;letter-spacing:.06em;line-height:1;}
        .session-title p{font-size:.8rem;font-weight:900;letter-spacing:.25em;color:var(--red);margin-top:.5rem;text-transform:uppercase;}
        .session-actions{display:flex;gap:.8rem;}
        .btn-outline{background:none;border:1px solid rgba(225,216,183,.18);color:var(--bone);font-family:var(--fh);font-size:1rem;letter-spacing:.1em;padding:.65rem 1.3rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.5rem;}
        .btn-outline:hover{border-color:var(--red);color:var(--red);}
        .btn-solid{background:var(--red);border:1px solid var(--red);color:var(--black);font-family:var(--fh);font-size:1rem;letter-spacing:.1em;padding:.65rem 1.3rem;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;gap:.5rem;}
        .btn-solid:hover{opacity:.82;}
        .slot-group{margin-bottom:3rem;}
        .slot-group-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:.8rem;margin-bottom:0;border-bottom:2px solid rgba(225,216,183,.12);}
        .slot-group-title{font-family:var(--fd);font-size:2rem;color:var(--bone);}
        .slot-group-meta{font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--red);}
        .booking-col-headers{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:1rem;padding:.7rem 1rem;border-bottom:1px solid rgba(225,216,183,.06);background:rgba(225,216,183,.025);}
        .col-header{font-size:.65rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase;opacity:.4;}
        .booking-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;align-items:center;gap:1rem;padding:1.1rem 1rem;border-bottom:1px solid rgba(225,216,183,.05);transition:background .12s;}
        .booking-row:hover{background:rgba(225,216,183,.025);}
        .b-name{font-size:.95rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
        .b-guests{font-family:var(--fh);font-size:1.6rem;color:var(--red);line-height:1;}
        .b-guests-label{font-size:.6rem;font-weight:700;letter-spacing:.1em;opacity:.35;text-transform:uppercase;}
        .b-vegs{font-family:var(--fh);font-size:1.4rem;color:var(--red);line-height:1;}
        .b-actions{display:flex;gap:.35rem;justify-content:flex-end;}
        .icon-btn{width:30px;height:30px;background:none;border:1px solid rgba(225,216,183,.1);color:var(--bone);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;opacity:.5;}
        .icon-btn:hover{opacity:1;border-color:var(--red);color:var(--red);}
        .icon-btn.del:hover{border-color:#e05050;color:#e05050;}
        .empty-slot{padding:2rem 1rem;font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;opacity:.2;}
        /* Modal */
        .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:2rem;}
        .modal-backdrop.open{display:flex;}
        .modal-box{background:rgba(20,20,20,.98);border:1px solid rgba(225,216,183,.12);padding:2.5rem;width:100%;max-width:460px;backdrop-filter:blur(20px);position:relative;overflow:hidden;}
        .modal-box::before{content:'';position:absolute;top:50%;left:50%;width:60%;height:40%;background:var(--red);filter:blur(80px);opacity:.08;transform:translate(-50%,-50%);pointer-events:none;}
        .modal-box>*{position:relative;z-index:1;}
        .modal-title{font-family:var(--fh);font-size:2.2rem;letter-spacing:.06em;margin-bottom:2rem;}
        .modal-field{margin-bottom:1.2rem;}
        .modal-field label{display:block;font-size:.75rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;opacity:.5;margin-bottom:.45rem;}
        .modal-field input,.modal-field select{width:100%;background:rgba(225,216,183,.03);border:1px solid rgba(225,216,183,.15);border-radius:2px;color:var(--bone);padding:1rem 1.2rem;font-size:.95rem;font-family:var(--fb);transition:all .3s;}
        .modal-field select{background:#1a1a1a;}
        .modal-field input:focus,.modal-field select:focus{outline:none;border-color:var(--red);background:rgba(225,216,183,.07);box-shadow:0 0 10px rgba(200,6,19,.2);}
        .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-top:1.8rem;}
        /* Print */
        @media print{
            body{background:white!important;color:black!important;}
            .texture,.topbar,.session-back,.session-actions,.b-actions,.booking-col-headers,.modal-backdrop,.dev-panel{display:none!important;}
            .wrap{border:none!important;background:white!important;margin:0!important;padding:.5rem 1rem!important;}
            .wrap::before{display:none!important;}
            #homeView{display:none!important;}
            #sessionView{display:block!important;}
            .session-header{border-bottom:2px solid #222!important;margin-bottom:1.5rem!important;padding-bottom:1rem!important;}
            .session-title h2{color:black;font-size:2rem;}
            .session-title p{color:#C80613;}
            .slot-group{page-break-inside:avoid;margin-bottom:2rem;}
            .slot-group-header{border-bottom:2px solid #222!important;}
            .slot-group-title{color:black;}
            .slot-group-meta{color:#C80613;}
            .booking-row{grid-template-columns:2fr 1fr 1fr!important;border-bottom:1px solid #ddd!important;padding:.7rem 0!important;}
            .b-name{color:black;font-size:.9rem;}
            .b-guests{color:#C80613;font-size:1.2rem;}
            .b-guests-label{color:#999;opacity:1;}
            .b-vegs{color:#C80613;}
            .print-col-headers{display:grid!important;}
            .print-date-line{display:block!important;}
        }
        .print-col-headers{display:none;grid-template-columns:2fr 1fr 1fr;gap:1rem;padding:.5rem 0;margin-bottom:.3rem;border-bottom:1px solid #ccc;}
        .print-col-header{font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#666;}
        .print-date-line{display:none;font-size:.75rem;color:#999;margin-bottom:1.5rem;font-style:italic;}
        @media(max-width:800px){.tuesday-grid{grid-template-columns:1fr;}.wrap{margin:1rem;padding:1.5rem;}.block-dates,.dev-date-grid{grid-template-columns:repeat(2,1fr);}}
        /* refresh button removed */
        .btn-new-booking{background:var(--red);border:1px solid var(--red);color:#151515;padding:.5rem 1.2rem;font-family:var(--fh);font-size:.95rem;letter-spacing:.12em;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;gap:.5rem;}
        .btn-new-booking:hover{opacity:.85;}
        .nb-date-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:.2rem;}
        .nb-date-btn{padding:.9rem .5rem;background:transparent;border:1px solid rgba(225,216,183,.15);color:var(--bone);cursor:pointer;text-align:center;transition:all .2s;font-family:var(--fb);}
        .nb-date-btn .nb-day{display:block;font-family:var(--fh);font-size:1.4rem;line-height:1;}
        .nb-date-btn .nb-month{display:block;font-size:.65rem;font-weight:700;letter-spacing:.1em;opacity:.5;margin-top:.2rem;}
        .nb-date-btn.active{background:var(--red);border-color:var(--red);color:#151515;}
        .nb-date-btn.active .nb-month{opacity:.8;}
        .nb-time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;}
        .nb-time-btn{padding:1rem;background:transparent;border:1px solid rgba(225,216,183,.15);color:var(--bone);font-family:var(--fh);font-size:1.4rem;letter-spacing:.05em;cursor:pointer;transition:all .2s;}
        .nb-time-btn.active{background:var(--red);border-color:var(--red);color:#151515;}
        .nb-guests-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:.4rem;}
        .nb-guest-btn{aspect-ratio:1;background:transparent;border:1px solid rgba(225,216,183,.15);color:var(--bone);font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
        .nb-guest-btn.active{background:var(--red);border-color:var(--red);color:#151515;}
        .nb-guest-btn.zero{opacity:.4;}
    </style>
</head>
<body>
<div class="texture"></div>
<main class="wrap">
    <header class="topbar">
        <div class="topbar-brand">HELL <span>PIZZA</span> &mdash; STAFF</div>
        <div class="topbar-right">
            <button class="dev-btn" onclick="toggleDevPanel()"><i data-lucide="settings" size="14"></i>DEV</button>
            <button class="btn-new-booking" onclick="openNewBooking()"><i data-lucide="plus" size="14"></i>NEW BOOKING</button>
        </div>
    </header>

    <!-- DEV PANEL -->
    <div class="dev-panel" id="devPanel">
        <div class="dev-panel-title"><i data-lucide="settings" size="16"></i>SESSION CONTROLS</div>
        <div class="dev-section">
            <div class="dev-section-title">Stop bookings — select date then toggle slots</div>
            <div class="dev-date-grid" id="devDateSelector"></div>
            <div class="slot-toggles" id="slotToggles"></div>
        </div>
        <div class="dev-section">
            <div class="dev-section-title">Block entire session (one-off closure)</div>
            <div class="block-dates" id="blockDateSelector"></div>
            <p class="block-label">Blocked dates show as fully sold out on the booking form.</p>
        </div>
    </div>

    <!-- HOME -->
    <div id="homeView">
        <div class="home-heading"><h1>UPCOMING SESSIONS</h1><p>All You Can Eat Tuesday &mdash; Bond St</p></div>
        <div class="tuesday-grid" id="tuesdayGrid"></div>
    </div>

    <!-- SESSION -->
    <div id="sessionView">
        <button class="session-back" onclick="showHome()"><i data-lucide="arrow-left" size="15"></i>ALL SESSIONS</button>
        <div class="session-header">
            <div class="session-title"><h2 id="sessionTitle">TUESDAY</h2><p id="sessionSubtitle">LOADING...</p></div>
            <div class="session-actions">
                <button class="btn-outline" onclick="refreshSession()"><i data-lucide="refresh-cw" size="14" id="refreshIcon"></i>REFRESH</button>
                <button class="btn-outline" onclick="window.print()"><i data-lucide="printer" size="14"></i>PRINT</button>
            </div>
        </div>
        <p class="print-date-line" id="printDateLine"></p>
        <div id="slotSections"></div>
    </div>
</main>

<!-- NEW BOOKING MODAL -->
<div class="modal-backdrop" id="newBookingModal">
    <div class="modal-box" style="max-width:520px;">
        <h2 class="modal-title">NEW BOOKING</h2>

        <!-- Date selector -->
        <div class="modal-field">
            <label>Session Date</label>
            <div class="nb-date-grid" id="nbDateGrid"></div>
        </div>

        <!-- Time selector -->
        <div class="modal-field">
            <label>Arrival Time</label>
            <div class="nb-time-grid" id="nbTimeGrid">
                <button type="button" class="nb-time-btn" data-time="5:30" onclick="nbSelectTime('5:30')">5:30 PM</button>
                <button type="button" class="nb-time-btn" data-time="6:00" onclick="nbSelectTime('6:00')">6:00 PM</button>
                <button type="button" class="nb-time-btn" data-time="6:30" onclick="nbSelectTime('6:30')">6:30 PM</button>
            </div>
        </div>

        <!-- Name -->
        <div class="modal-field">
            <label>Name</label>
            <input type="text" id="nbName" placeholder="Full name" autocomplete="off">
        </div>
        <!-- Phone + Email side by side — at least one required -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;">
            <div class="modal-field">
                <label>Phone <span style="opacity:0.4;font-weight:400;text-transform:none;letter-spacing:0;font-size:0.7rem;">(or email)</span></label>
                <input type="tel" id="nbPhone" placeholder="021 000 000" autocomplete="off">
            </div>
            <div class="modal-field">
                <label>Email <span style="opacity:0.4;font-weight:400;text-transform:none;letter-spacing:0;font-size:0.7rem;">(or phone)</span></label>
                <input type="email" id="nbEmail" placeholder="email@example.com" autocomplete="off">
            </div>
        </div>

        <!-- Guests -->
        <div class="modal-field">
            <label>Guests</label>
            <div class="nb-guests-grid" id="nbGuestsGrid"></div>
        </div>

        <!-- Vegs -->
        <div class="modal-field">
            <label>Vegetarians <span style="opacity:0.4;font-weight:400;text-transform:none;letter-spacing:0;font-size:0.7rem;">(optional)</span></label>
            <div class="nb-guests-grid" id="nbVegsGrid"></div>
        </div>

        <div class="modal-btns">
            <button class="btn-solid" onclick="submitNewBooking()" id="nbSubmitBtn">BOOK IN</button>
            <button class="btn-outline" onclick="closeNewBooking()">CANCEL</button>
        </div>
        <p id="nbError" style="color:#C80613;font-size:0.75rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-top:1rem;display:none;"></p>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-backdrop" id="editModal">
    <div class="modal-box">
        <h2 class="modal-title">EDIT BOOKING</h2>
        <input type="hidden" id="editRef">
        <div class="modal-field"><label>Name</label><input type="text" id="editName"></div>
        <div class="modal-field"><label>Phone</label><input type="tel" id="editPhone"></div>
        <div class="modal-field"><label>Guests</label><input type="number" id="editGuests" min="1" max="15"></div>
        <div class="modal-field"><label>Arrival Time</label>
            <select id="editTime">
                <option value="5:30">5:30 PM</option>
                <option value="6:00">6:00 PM</option>
                <option value="6:30">6:30 PM</option>
            </select>
        </div>
        <div class="modal-btns">
            <button class="btn-solid" onclick="saveEdit()">SAVE CHANGES</button>
            <button class="btn-outline" onclick="closeEditModal()">CANCEL</button>
        </div>
    </div>
</div>

<script>
var SB_URL = 'https://zmhfympqxvdkotyjzvuk.supabase.co';
var SB_KEY = 'sb_publishable_I5WfIE7qy58qjLz6TsvqVw_ZI60hNDW';
var SLOTS  = ['5:30','6:00','6:30'];
var CAPACITY = 30;

var state = { sessions:[], currentDate:null, devDate:null, controls:{}, lastSyncedAt:null };
var MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function localDateStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function getUpcomingTuesdays(){
    var now=new Date(), offset=(2-now.getDay()+7)%7;
    if(offset===0&&now.getHours()>=20) offset=7;
    var out=[];
    for(var i=0;i<4;i++){
        var d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+offset+i*7,12,0,0);
        out.push({dateStr:localDateStr(d),day:d.getDate(),month:MONTHS[d.getMonth()],year:d.getFullYear(),label:'TUESDAY '+d.getDate()+' '+MONTHS[d.getMonth()]});
    }
    return out;
}

async function sb(path,opts){
    var res=await fetch(SB_URL+'/rest/v1/'+path,Object.assign({headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}},opts||{}));
    var t=await res.text(); return t?JSON.parse(t):null;
}

function totalBooked(s){ return (s.bookings||[]).reduce(function(a,b){return a+(parseInt(b.guests)||0);},0); }
function slotBooked(s,t){ return (s.bookings||[]).filter(function(b){return b.time===t;}).reduce(function(a,b){return a+(parseInt(b.guests)||0);},0); }
function getCtrl(d){ if(!state.controls[d]) state.controls[d]={blocked:false,stoppedSlots:[]}; return state.controls[d]; }
function isBlocked(d){ return getCtrl(d).blocked; }
function isStopped(d,t){ return getCtrl(d).stoppedSlots.indexOf(t)>=0; }

lucide.createIcons();

async function init(){
    state.sessions=getUpcomingTuesdays().map(function(t){return Object.assign({},t,{bookings:[],loaded:false});});
    // Load controls from Supabase
    try{
        var rows=await sb('controls?id=eq.1');
        if(rows&&rows.length>0) state.controls=rows[0].data||{};
    }catch(e){}
    renderHome();
    // Fetch all sessions in parallel
    await Promise.all(state.sessions.map(function(_,i){return fetchSession(i);}));
}

function renderHome(){
    var grid=document.getElementById('tuesdayGrid');
    grid.innerHTML=state.sessions.map(function(s,i){
        return '<div class="tuesday-card'+(isBlocked(s.dateStr)?' is-blocked':'')+'" onclick="openSession('+i+')">'
            +'<div class="card-top"><div class="card-date"><div class="card-day-num">'+s.day+'</div>'
            +'<div class="card-date-detail"><div class="card-month">'+s.month+'</div><div class="card-year">'+s.year+'</div></div>'
            +'</div><i data-lucide="arrow-right" size="18" class="card-arrow"></i></div>'
            +'<div class="card-divider"></div>'
            +'<div class="card-bottom" id="cb-'+i+'">'+renderCardBottom(s)+'</div></div>';
    }).join('');
    lucide.createIcons();
}

function renderCardBottom(s){
    if(!s.loaded) return '<div class="card-loading-text">Loading...</div>';
    var total=totalBooked(s);
    var badges='';
    if(isBlocked(s.dateStr)) badges='<span class="badge badge-blocked">BLOCKED</span>';
    else if(getCtrl(s.dateStr).stoppedSlots.length>0) badges='<span class="badge badge-stopped">SLOTS STOPPED: '+getCtrl(s.dateStr).stoppedSlots.join(', ')+'</span>';
    var mini=SLOTS.map(function(t){
        var c=slotBooked(s,t), stopped=isStopped(s.dateStr,t);
        return '<div class="mini-slot'+(stopped?' stopped':c>0?' active':'')+'"><div class="mini-dot"></div>'+t+' PM &mdash; '+(stopped?'STOPPED':c)+'</div>';
    }).join('');
    return '<div class="card-total"><div class="card-total-num">'+(isBlocked(s.dateStr)?'🚫':total)+'</div>'
        +'<div class="card-total-label">'+(isBlocked(s.dateStr)?'BLOCKED':'people booked')+'</div></div>'
        +'<div class="card-slots-mini">'+mini+'</div>'
        +(badges?'<div style="grid-column:1/-1;margin-top:.8rem;">'+badges+'</div>':'');
}

function updateCardBottom(i){
    var el=document.getElementById('cb-'+i);
    if(el){el.innerHTML=renderCardBottom(state.sessions[i]);lucide.createIcons();}
    var cards=document.querySelectorAll('.tuesday-card');
    if(cards[i]) cards[i].classList.toggle('is-blocked',isBlocked(state.sessions[i].dateStr));
}

async function fetchSession(index){
    var session=state.sessions[index];
    try{
        var rows=await sb('bookings?date=eq.'+encodeURIComponent(session.dateStr)+'&order=time.asc,name.asc');
        session.bookings=rows||[];
        session.loaded=true;
        if(state.currentDate===session.dateStr){
            renderSessionDetail(index);
            state.lastSyncedAt=Date.now();
            updateSyncLabel();
        }
    }catch(e){session.loaded=true;}
    updateCardBottom(index);
    return true;
}

function updateSyncLabel(){
    var el=document.getElementById('lastSynced');
    if(!el||!state.lastSyncedAt) return;
    var secs=Math.round((Date.now()-state.lastSyncedAt)/1000);
    el.textContent=secs<=2?'Bookings synced just now':'Bookings synced '+secs+'s ago';
}

function showHome(){
    document.getElementById('homeView').style.display='';
    document.getElementById('sessionView').style.display='none';
    state.currentDate=null;
}

function openSession(i){
    state.currentDate=state.sessions[i].dateStr;
    document.getElementById('homeView').style.display='none';
    document.getElementById('sessionView').style.display='block';
    renderSessionDetail(i);
    fetchSession(i);
}

function currentIdx(){ return state.sessions.findIndex(function(s){return s.dateStr===state.currentDate;}); }

// refresh button removed

function renderSessionDetail(index){
    var s=state.sessions[index];
    var total=totalBooked(s);
    document.getElementById('sessionTitle').textContent=s.label;
    document.getElementById('sessionSubtitle').textContent=s.loaded
        ?total+' PEOPLE BOOKED — '+s.bookings.length+' RESERVATION'+(s.bookings.length!==1?'S':'')
        :'LOADING...';
    document.getElementById('printDateLine').textContent='Printed '+new Date().toLocaleString('en-NZ')+' — '+s.label;
    var container=document.getElementById('slotSections');
    if(!s.loaded){container.innerHTML='<div class="empty-slot">Loading bookings...</div>';return;}
    container.innerHTML=SLOTS.map(function(time){
        var rows=(s.bookings||[]).filter(function(b){return b.time===time;}).sort(function(a,b){return a.name.localeCompare(b.name);});
        var guestCount=rows.reduce(function(acc,b){return acc+(parseInt(b.guests)||0);},0);
        var rowsHtml=rows.length>0
            ?rows.map(function(b){
                return '<div class="booking-row">'
                    +'<div class="b-name">'+esc(b.name)+'</div>'
                    +'<div><div class="b-guests">'+b.guests+'</div><div class="b-guests-label">guests</div></div>'
                    +'<div><div class="b-vegs">'+(b.vegetarians>0?b.vegetarians:'—')+'</div><div class="b-guests-label">vegs</div></div>'
                    +'<div class="b-actions">'
                    +'<button class="icon-btn" onclick="openEdit(\''+escA(b.ref)+'\')" title="Edit"><i data-lucide="pencil" size="13"></i></button>'
                    +'<button class="icon-btn del" onclick="delBooking(\''+escA(b.ref)+'\')" title="Delete"><i data-lucide="trash-2" size="13"></i></button>'
                    +'</div></div>';
            }).join('')
            :'<div class="empty-slot">No bookings yet</div>';
        return '<div class="slot-group">'
            +'<div class="slot-group-header"><div class="slot-group-title">'+time+' PM</div>'
            +'<div class="slot-group-meta">'+guestCount+' PEOPLE &bull; '+rows.length+' BOOKING'+(rows.length!==1?'S':'')+'</div></div>'
            +'<div class="print-col-headers"><div class="print-col-header">Name</div><div class="print-col-header">Guests</div><div class="print-col-header">Vegs</div></div>'
            +rowsHtml+'</div>';
    }).join('');
    lucide.createIcons();
}

// ── EDIT ──
function openEdit(ref){
    var i=currentIdx();if(i<0)return;
    var b=state.sessions[i].bookings.find(function(b){return b.ref===ref;});
    if(!b)return;
    document.getElementById('editRef').value=b.ref;
    document.getElementById('editName').value=b.name;
    document.getElementById('editPhone').value=b.phone;
    document.getElementById('editGuests').value=b.guests;
    document.getElementById('editTime').value=b.time;
    document.getElementById('editModal').classList.add('open');
}
function closeEditModal(){document.getElementById('editModal').classList.remove('open');}
async function saveEdit(){
    var ref=document.getElementById('editRef').value;
    var payload={name:document.getElementById('editName').value,phone:document.getElementById('editPhone').value,guests:parseInt(document.getElementById('editGuests').value),time:document.getElementById('editTime').value};
    var i=currentIdx();
    if(i>=0){var b=state.sessions[i].bookings.find(function(b){return b.ref===ref;});if(b)Object.assign(b,payload);renderSessionDetail(i);updateCardBottom(i);}
    closeEditModal();
    try{await sb('bookings?ref=eq.'+encodeURIComponent(ref),{method:'PATCH',body:JSON.stringify(payload)});setTimeout(function(){fetchSession(i);},500);}
    catch(e){alert('Save may have failed — please refresh.');}
}

// ── DELETE ──
async function delBooking(ref){
    if(!confirm('REMOVE THIS BOOKING?'))return;
    var i=currentIdx();
    if(i>=0){state.sessions[i].bookings=state.sessions[i].bookings.filter(function(b){return b.ref!==ref;});renderSessionDetail(i);updateCardBottom(i);}
    try{await sb('bookings?ref=eq.'+encodeURIComponent(ref),{method:'DELETE'});setTimeout(function(){fetchSession(i);},500);}
    catch(e){alert('Delete may have failed — please refresh.');}
}

// ── DEV PANEL ──
function toggleDevPanel(){
    var p=document.getElementById('devPanel');
    p.classList.toggle('open');
    if(p.classList.contains('open')) renderDevPanel();
}
function renderDevPanel(){
    if(!state.devDate) state.devDate=state.sessions[0].dateStr;
    renderDevDates('devDateSelector',state.devDate,function(d){state.devDate=d;renderSlotToggles();renderDevDates('devDateSelector',state.devDate,arguments.callee);});
    renderSlotToggles();
    renderDevDates('blockDateSelector',null,function(d){toggleBlock(d);},true);
}
function renderDevDates(id,active,onClick,showBlocked){
    var el=document.getElementById(id);if(!el)return;
    el.innerHTML=state.sessions.map(function(s){
        var isA=s.dateStr===active, isB=showBlocked&&isBlocked(s.dateStr);
        return '<button class="block-date-btn'+(isA?' active-dev':'')+(isB?' blocked':'')+'" onclick="('+onClick.toString()+')('+"'"+s.dateStr+"'"+')">'
            +'<span class="bd-day">'+s.day+'</span><span class="bd-month">'+s.month+'</span></button>';
    }).join('');
}
function renderSlotToggles(){
    var el=document.getElementById('slotToggles');if(!el||!state.devDate)return;
    el.innerHTML=SLOTS.map(function(slot){
        var stopped=isStopped(state.devDate,slot);
        return '<div class="slot-toggle'+(stopped?' stopped':'')+'" onclick="toggleSlot(\''+slot+'\')">'
            +'<div class="toggle-switch"></div><div class="slot-toggle-time">'+slot+' PM</div>'
            +'<div class="slot-toggle-status">'+(stopped?'BOOKINGS STOPPED':'ACCEPTING BOOKINGS')+'</div></div>';
    }).join('');
}
async function toggleSlot(slot){
    var ctrl=getCtrl(state.devDate);
    var idx=ctrl.stoppedSlots.indexOf(slot);
    if(idx>=0)ctrl.stoppedSlots.splice(idx,1);else ctrl.stoppedSlots.push(slot);
    await sb('controls?id=eq.1',{method:'PATCH',body:JSON.stringify({data:state.controls})});
    renderSlotToggles();
    state.sessions.forEach(function(_,i){updateCardBottom(i);});
}
async function toggleBlock(dateStr){
    var ctrl=getCtrl(dateStr);
    ctrl.blocked=!ctrl.blocked;
    await sb('controls?id=eq.1',{method:'PATCH',body:JSON.stringify({data:state.controls})});
    renderDevPanel();
    state.sessions.forEach(function(_,i){updateCardBottom(i);});
}

// ── NEW BOOKING ──
var nb = { date: null, time: null, guests: 1, vegs: 0 };

function openNewBooking(){
    nb = { date: null, time: null, guests: 1, vegs: 0 };
    buildNbDates();
    buildNbGuests();
    buildNbVegs();
    document.getElementById('nbName').value = '';
    document.getElementById('nbEmail').value = '';
    document.getElementById('nbPhone').value = '';
    document.getElementById('nbError').style.display = 'none';
    document.getElementById('nbSubmitBtn').textContent = 'BOOK IN';
    document.getElementById('nbSubmitBtn').disabled = false;
    document.getElementById('newBookingModal').classList.add('open');
    setTimeout(function(){ document.getElementById('nbName').focus(); }, 100);
}

function closeNewBooking(){
    document.getElementById('newBookingModal').classList.remove('open');
}

function buildNbDates(){
    var grid = document.getElementById('nbDateGrid');
    var MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    grid.innerHTML = state.sessions.map(function(s){
        return '<button type="button" class="nb-date-btn'+(nb.date===s.dateStr?' active':'')+'" onclick="nbSelectDate(''+s.dateStr+'')">'
            +'<span class="nb-day">'+s.day+'</span>'
            +'<span class="nb-month">'+s.month+'</span>'
            +'</button>';
    }).join('');
}

function nbSelectDate(dateStr){
    nb.date = dateStr;
    document.querySelectorAll('.nb-date-btn').forEach(function(b){
        b.classList.toggle('active', b.onclick.toString().indexOf(dateStr) >= 0);
    });
    buildNbDates();
}

function nbSelectTime(time){
    nb.time = time;
    document.querySelectorAll('.nb-time-btn').forEach(function(b){
        b.classList.toggle('active', b.dataset.time === time);
    });
}

function buildNbGuests(){
    var grid = document.getElementById('nbGuestsGrid');
    grid.innerHTML = '';
    for(var i=1;i<=15;i++){
        var btn=document.createElement('button');
        btn.type='button';
        btn.textContent=i;
        btn.className='nb-guest-btn'+(i===nb.guests?' active':'');
        btn.onclick=(function(val){ return function(){
            nb.guests=val;
            // Cap vegs to new guest count
            if(nb.vegs>val) nb.vegs=0;
            buildNbGuests();
            buildNbVegs();
        };})(i);
        grid.appendChild(btn);
    }
}

function buildNbVegs(){
    var grid = document.getElementById('nbVegsGrid');
    grid.innerHTML = '';
    // 0 button first
    var zero=document.createElement('button');
    zero.type='button'; zero.textContent='0';
    zero.className='nb-guest-btn zero'+(nb.vegs===0?' active':'');
    zero.onclick=function(){ nb.vegs=0; buildNbVegs(); };
    grid.appendChild(zero);
    for(var i=1;i<=nb.guests;i++){
        var btn=document.createElement('button');
        btn.type='button'; btn.textContent=i;
        btn.className='nb-guest-btn'+(i===nb.vegs?' active':'');
        btn.onclick=(function(val){ return function(){ nb.vegs=val; buildNbVegs(); }; })(i);
        grid.appendChild(btn);
    }
}

async function submitNewBooking(){
    var name  = document.getElementById('nbName').value.trim();
    var phone = document.getElementById('nbPhone').value.trim();
    var errEl = document.getElementById('nbError');
    errEl.style.display = 'none';

    var email = document.getElementById('nbEmail').value.trim();
    if(!nb.date)           { showNbError('Please select a date'); return; }
    if(!nb.time)           { showNbError('Please select an arrival time'); return; }
    if(!name)              { showNbError('Please enter a name'); document.getElementById('nbName').focus(); return; }
    if(!phone && !email)   { showNbError('Please enter a phone number or email'); document.getElementById('nbPhone').focus(); return; }

    var btn = document.getElementById('nbSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'BOOKING...';

    try {
        // Generate ref
        var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789', ref='HELL-';
        for(var i=0;i<6;i++) ref+=chars[Math.floor(Math.random()*chars.length)];

        await sb('bookings', {
            method: 'POST',
            body: JSON.stringify({
                date:        nb.date,
                time:        nb.time,
                name:        name,
                phone:       phone,
                email:       document.getElementById('nbEmail').value.trim(),
                guests:      nb.guests,
                vegetarians: nb.vegs,
                ref:         ref
            })
        });

        closeNewBooking();

        // Refresh the relevant session
        var idx = state.sessions.findIndex(function(s){ return s.dateStr === nb.date; });
        if(idx >= 0) fetchSession(idx);

    } catch(e) {
        btn.disabled = false;
        btn.textContent = 'BOOK IN';
        showNbError('Something went wrong. Try again.');
    }
}

function showNbError(msg){
    var el = document.getElementById('nbError');
    el.textContent = msg;
    el.style.display = 'block';
}

document.getElementById('newBookingModal').addEventListener('click', function(e){ if(e.target===this) closeNewBooking(); });

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return String(s||'').replace(/'/g,"\\'");}

document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeEditModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeEditModal();});

init();

// Auto-refresh every 10 seconds
setInterval(function(){
    var i=currentIdx();
    if(i>=0) fetchSession(i);
    else state.sessions.forEach(function(_,idx){ fetchSession(idx); });
}, 10000);

// Update "X seconds ago" label every second
setInterval(updateSyncLabel, 1000);
</script>
</body>
</html>
